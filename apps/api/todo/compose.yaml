---
services:
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped
  api-scalar:
    image: scalarapi/api-reference:latest
    ports:
      - "8081:8080"
    volumes:
      # Mount your OpenAPI documents directory
      # scalar automatically scans for spec files in this directory.
      # multiple files -> /openapi/{filename}
      - ./:/docs
    environment:
      # Specify the path to your OpenAPI document
      # Optional: Add global configuration like theme
      API_REFERENCE_CONFIG: |
        {
          "theme": "deepSpace"
        }
    restart: unless-stopped
  swagger-ui:
    image: docker.swagger.io/swaggerapi/swagger-ui
    ports:
      - 8082:8080
    volumes:
      - ./:/docs
    environment:
      SWAGGER_JSON: /docs/openapi.yaml
