apiVersion: v1
kind: Pod
metadata:
  labels:
    app: downward-vol
    tier: backend
  name: downward-vol
spec:
  containers:
  - image: busybox
    name: downward-vol
    resources: {}
    command: ["sh", "-c"]
    args:
      - find /etc/podinfo -exec cat {} +
    volumeMounts:
      - name: podinfo
        mountPath: /etc/podinfo
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  volumes:
    - name: podinfo
      downwardAPI:
        items:
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
          - path: "name"
            fieldRef:
              fieldPath: metadata.name
          - path: "namespace"
            fieldRef:
              fieldPath: metadata.namespace
status: {}
