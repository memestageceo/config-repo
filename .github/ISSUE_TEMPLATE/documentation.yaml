name: "Documentation"
description: A README is missing, outdated, or unclear.
title: "[docs]: "
labels: ["documentation"]
body:
  - type: input
    id: path
    attributes:
      label: Which file or folder?
      placeholder: "e.g. helm/charts/monitoring/README.md"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: What's the issue?
      options:
        - Missing documentation
        - Outdated / incorrect
        - Unclear / hard to follow
        - Other
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: Details
      description: What's wrong and what should it say instead?
    validations:
      required: true
