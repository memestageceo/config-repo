apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: fastapi-hpa
  name: fastapi-hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-hpa
  strategy: {}
  template:
    metadata:
      labels:
        app: fastapi-hpa
    spec:
      containers:
      - image: noneofyabusiness/fastapi-hpa:1
        name: fastapi-hpa
        ports:
          - containerPort: 8080
        resources: 
          requests:
            cpu: 100m
          limits:
            cpu: 300m

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: fastapi-hpa
  name: fastapi-hpa
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: fastapi-hpa
  type: ClusterIP
