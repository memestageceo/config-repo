apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx
  name: nginxsvc
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
      nodePort: 30950
  selector:
    app: nginx
  type: NodePort
status:
  loadBalancer: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-nginx
  name: my-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx
    spec:
      volumes:
      - name: secret-volume
        secret: 
          secretName: nginxsecret
      - name: configmap-volume
        configMap:
          name: nginxconfigmap
      containers:
        - image: nginx-https:1.0
          name: nginx-https
          resources: {}
          command: ["/home/auto-reload-nginx.sh"]
          ports:
            - containerPort: 80
            - containerPort: 443
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 30
            timeoutSeconds: 1
          volumeMounts:
          - name: secret-volume
            mountPath: /etc/nginx/ssl
          - name: configmap-volume
            mountPath: /etc/nginx/conf.d
status: {}
