# ==============================================================================
# KUBERNETES RBAC: THE COMPREHENSIVE GUIDE
# Logic: Permissions are purely ADDITIVE (White-list). No "Deny" rules exist.
# ==============================================================================

# 1. ROLE: The "What" (Namespaced)
# Best for: Granting access to resources within a single namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: development
  name: pod-manager
rules:
  - apiGroups: [""] # "" indicates the core API group (Pods, ConfigMaps, etc.)
    resources: ["pods", "pods/log"] # Sub-resources (like /log or /exec) must be explicit
    verbs: ["get", "list", "watch", "update"] # The actions allowed

---
# 2. CLUSTERROLE: The "What" (Global or Special)
# Best for: Cluster-wide resources (Nodes), cross-namespace access, or non-resource paths.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-reader-global
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    # resourceNames: Limit access to specific instances to prevent "lateral movement"
    resourceNames: ["app-config-secret"]
    verbs: ["get"]
  - nonResourceURLs: ["/healthz", "/metrics"] # Used for monitoring/health checks
    verbs: ["get"]

---
# 3. AGGREGATED CLUSTERROLE: The "Role Lego"
# The 'parent' role dynamically inherts rules from any ClusterRole with matching labels.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitoring-aggregate-view
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.example.com/aggregate: "true"
rules: [] # Left empty; the Control Plane Controller fills this automatically.

---
# 4. AGGREGATION SOURCE: The "Contributor"
# This role "plugs into" the parent above via the label selector.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitoring-custom-metrics
  labels:
    rbac.example.com/aggregate: "true"
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# 5. ROLEBINDING: The "Who-to-What" (Namespaced)
# Grants permissions of a Role (or ClusterRole) to users within a specific namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-binding
  namespace: development
subjects:
  - kind: User
    name: "jane@example.com" # Case-sensitive!
    apiGroup: rbac.authorization.k8s.io
  - kind: ServiceAccount
    name: default
    namespace: development
roleRef:
  kind: Role # Can also point to a ClusterRole to grant those rules locally
  name: pod-manager
  apiGroup: rbac.authorization.k8s.io # Note: roleRef is IMMUTABLE after creation

---
# 6. CLUSTERROLEBINDING: The "Global Who-to-What"
# Grants permissions across the entire cluster (all namespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: global-admin-binding
subjects:
  - kind: Group
    name: "system:serviceaccounts:qa" # Grants to ALL ServiceAccounts in the 'qa' namespace
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin # Using a default built-in ClusterRole
  apiGroup: rbac.authorization.k8s.io

---
# 7. ESCALATION PREVENTION & "BIND" VERB
# To prevent a user from "leveling up" their own permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sudo-lite
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    # 'bind' allows creating a binding IF you already have the permissions in the Role.
    # 'escalate' allows editing a role to add permissions you DON'T have. Use with extreme caution.
    verbs: ["get", "list", "bind"]
