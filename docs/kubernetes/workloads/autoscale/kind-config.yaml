kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
#networking:
#  disableDefaultCNI: true
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
            extraArgs:
              enable-admission-plugins: NodeRestriction,MutatingAdmissionWebhook,ValidatingAdmissionWebhook
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
  - role: worker
    labels:
      tier: frontend
  - role: worker
    labels:
      tier: backend
